databases:
  - name: realestate-db
    databaseName: realestate
    region: frankfurt
    plan: free

services:
  - type: web
    name: realestate
    region: frankfurt
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn mysite.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://realestate.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: realestate-db
          property: connectionString
